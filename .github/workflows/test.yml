name: Run integration tests

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-node@v1
      - name: Install dependencies
        run: npm install
      - name: Build application for ${{ matrix.os }}
        run: npm run electron:build
      - name: Run integration tests
        run: npm run test
